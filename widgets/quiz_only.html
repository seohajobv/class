<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시간관리 유형 자가진단</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f7;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 48px}
  .card{background:#fff;border-radius:24px;width:100%;max-width:480px;padding:28px 24px;box-shadow:0 4px 24px rgba(0,0,0,.08)}

  /* 헤더 */
  .header{text-align:center;margin-bottom:28px}
  .header .badge{display:inline-block;background:#EEF2FF;color:#4F46E5;font-size:11px;font-weight:700;letter-spacing:.08em;padding:5px 12px;border-radius:20px;margin-bottom:12px}
  .header h1{font-size:20px;font-weight:700;color:#111;line-height:1.4;margin-bottom:6px}
  .header p{font-size:13px;color:#888;line-height:1.5}

  /* 진행 바 */
  .progress-wrap{margin-bottom:24px}
  .progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .progress-meta span{font-size:12px;color:#aaa}
  .progress-meta strong{font-size:13px;color:#4F46E5;font-weight:700}
  .progress-track{height:6px;background:#EEF2FF;border-radius:3px;overflow:hidden}
  .progress-bar{height:6px;background:linear-gradient(90deg,#6366F1,#818CF8);border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}

  /* 문항 */
  .q-num{font-size:11px;font-weight:700;color:#A5B4FC;letter-spacing:.06em;margin-bottom:10px}
  .q-text{font-size:17px;font-weight:500;color:#111;line-height:1.6;margin-bottom:8px;min-height:56px}
  .q-rev{font-size:12px;color:#F59E0B;font-weight:500;min-height:20px;margin-bottom:20px}

  /* 버튼 */
  .btn-row{display:flex;gap:10px}
  .btn{flex:1;padding:14px 10px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:transform .12s,box-shadow .12s;font-family:'Noto Sans KR',sans-serif}
  .btn:active{transform:scale(.96)}
  .btn-yes{background:#4F46E5;color:#fff;box-shadow:0 4px 12px rgba(79,70,229,.3)}
  .btn-yes:hover{box-shadow:0 6px 18px rgba(79,70,229,.4)}
  .btn-no{background:#F3F4F6;color:#555}
  .btn-no:hover{background:#E5E7EB}

  /* 결과 */
  .result{display:none;text-align:center}
  .result.show{display:block}
  .score-ring{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#6366F1,#A78BFA);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px}
  .score-ring .num{font-size:32px;font-weight:700;color:#fff;line-height:1}
  .score-ring .denom{font-size:13px;color:rgba(255,255,255,.75);margin-top:2px}
  .result-type{font-size:22px;font-weight:700;color:#111;margin-bottom:10px}
  .result-desc{font-size:14px;color:#555;line-height:1.75;margin-bottom:20px;text-align:left}

  /* 유형 표 */
  .type-table{width:100%;border-collapse:collapse;margin-bottom:20px;font-size:13px}
  .type-table thead tr{background:#F8F7FF}
  .type-table th{padding:10px 12px;text-align:left;font-weight:700;color:#6366F1;font-size:11px;letter-spacing:.05em;border-bottom:2px solid #EEF2FF}
  .type-table td{padding:11px 12px;border-bottom:1px solid #F3F4F6;color:#333;vertical-align:middle;line-height:1.4}
  .type-table tr:last-child td{border-bottom:none}
  .type-table tr.highlight td{background:#EEF2FF}
  .type-table tr.highlight td:first-child{border-left:3px solid #6366F1}
  .score-range{font-size:12px;color:#999;white-space:nowrap}
  .type-name{font-weight:600;color:#222}
  .type-name.active{color:#4F46E5}

  /* 팁 박스 */
  .tip-box{background:#F8F7FF;border-radius:14px;padding:16px;margin-bottom:20px;text-align:left}
  .tip-box .tip-label{font-size:11px;font-weight:700;color:#6366F1;letter-spacing:.06em;margin-bottom:6px}
  .tip-box p{font-size:14px;color:#333;line-height:1.7}

  /* 재시작 */
  .retry-btn{width:100%;padding:14px;border-radius:14px;border:2px solid #E0E0E0;background:#fff;font-size:15px;font-weight:600;color:#888;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:border-color .15s,color .15s}
  .retry-btn:hover{border-color:#6366F1;color:#4F46E5}

  /* 퀴즈 섹션 숨기기 */
  .quiz-section{display:block}
  .quiz-section.hide{display:none}
</style>
</head>
<body>
<div class="card">

  <!-- 퀴즈 섹션 -->
  <div class="quiz-section" id="quiz-section">
    <div class="header">
      <div class="badge">DoDream 3주차</div>
      <h1>나의 시간관리 유형은?</h1>
      <p>10문항에 솔직하게 답해보세요</p>
    </div>

    <div class="progress-wrap">
      <div class="progress-meta">
        <span>진행률</span>
        <strong id="q-counter">1 / 10</strong>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="q-bar" style="width:10%"></div>
      </div>
    </div>

    <div class="q-num" id="q-num">Q 01</div>
    <div class="q-text" id="q-text"></div>
    <div class="q-rev" id="q-rev"></div>

    <div class="btn-row">
      <button class="btn btn-yes" onclick="answer(true)">해당해요</button>
      <button class="btn btn-no" onclick="answer(false)">아니에요</button>
    </div>
  </div>

  <!-- 결과 섹션 -->
  <div class="result" id="result">
    <div class="score-ring">
      <span class="num" id="r-score"></span>
      <span class="denom">/ 10점</span>
    </div>

    <div class="result-type" id="r-type"></div>
    <div class="result-desc" id="r-desc"></div>

    <table class="type-table" id="r-table">
      <thead>
        <tr><th>유형</th><th>점수</th><th>핵심 특징</th></tr>
      </thead>
      <tbody>
        <tr id="row0"><td><span class="type-name">시간 설계자</span></td><td class="score-range">8–10점</td><td>계획·실행 모두 탄탄</td></tr>
        <tr id="row1"><td><span class="type-name">성장 중인 관리자</span></td><td class="score-range">5–7점</td><td>의지는 있으나 실행 파동</td></tr>
        <tr id="row2"><td><span class="type-name">즉흥 생활자</span></td><td class="score-range">3–4점</td><td>감각으로 움직이는 타입</td></tr>
        <tr id="row3"><td><span class="type-name">시간 방랑자</span></td><td class="score-range">0–2점</td><td>계획 자체가 낯선 단계</td></tr>
      </tbody>
    </table>

    <div class="tip-box">
      <div class="tip-label">이번 주 실천 팁</div>
      <p id="r-tip"></p>
    </div>

    <button class="retry-btn" onclick="restart()">다시 해보기</button>
  </div>

</div>

<script>
var qs=[
  {t:"하루 시작 전 오늘 할 일을 미리 정해둔다",rev:false},
  {t:"마감일이 다가와야 과제를 시작하는 편이다",rev:true},
  {t:"수업이 끝난 날 그날 내용을 간단히 복습한다",rev:false},
  {t:"중요한 일과 급한 일을 구분해서 처리한다",rev:false},
  {t:"할 일이 많을 때 뭐부터 할지 몰라 멈추는 편이다",rev:true},
  {t:"할 일 목록을 만들어 하나씩 지워가는 것을 즐긴다",rev:false},
  {t:"공부할 때 핸드폰을 일부러 멀리 두는 편이다",rev:false},
  {t:"유튜브·SNS 보다가 계획한 일 못 한 적이 이번 주 3번 이상이다",rev:true},
  {t:"50분 공부·10분 휴식처럼 나만의 공부 리듬이 있다",rev:false},
  {t:"하루를 마치며 오늘 한 일을 간단히 돌아보는 편이다",rev:false}
];
var types=[
  {rid:"row0",name:"시간 설계자",
   desc:"계획을 세우고 실행하는 두 가지가 모두 탄탄한 유형이에요. 이 습관, 지금은 당연해 보여도 3학년 되면 이걸 가진 사람 찾기가 진짜 어려워져요. 지금 이 루틴이 취업까지 이어집니다.",
   tip:"가장 중요한 일을 골든타임 첫 번째에 배치하는 '개구리 먹기' 전략을 더해보세요. 이미 잘 하고 있으니 한 단계 더 올라갈 차례예요."},
  {rid:"row1",name:"성장 중인 관리자",
   desc:"월요일 아침엔 이번 주 완벽하게 살겠다고 다짐했는데, 화요일 저녁에 유튜브 한 편만 보다가 목요일이 돼있는 분들이죠. 의지가 없는 게 아니에요 — 루틴이 없는 거예요.",
   tip:"자기 전에 내일 할 일 딱 3가지만 메모앱에 적어보세요. 3가지 다 못해도 괜찮아요. 2개만 해도 어제보다 나아진 거니까요."},
  {rid:"row2",name:"즉흥 생활자",
   desc:"시간표 앱 깔았다가 이틀 만에 삭제하고, 다이어리 3월까지만 쓰고 방치한 경험 있죠? 자유로운 건 장점이에요. 단 중요한 순간을 놓치지만 않으면 됩니다.",
   tip:"집 가면서 '내일 할 일 1가지'만 정해보세요. 3가지 아니고, 딱 1가지. 그게 루틴의 시작이에요."},
  {rid:"row3",name:"시간 방랑자",
   desc:"계획 자체가 낯선 단계예요. 근데 이거 성격이 나쁜 게 아니에요. 지금까지 아무도 시간 쓰는 법을 제대로 가르쳐주지 않았던 거예요. 오늘 이 강의 들으러 온 것 자체가 이미 시작이에요.",
   tip:"강의 끝나고 나가면서 핸드폰 메모앱에 '내일 할 일 1가지'만 적어주세요. 딱 1가지. 그게 시간관리의 진짜 시작이에요."}
];
var cur=0,score=0;
function render(){
  var q=qs[cur];
  var n=(cur+1).toString().padStart(2,'0');
  document.getElementById('q-num').textContent='Q '+n;
  document.getElementById('q-text').textContent=q.t;
  document.getElementById('q-rev').textContent='';
  document.getElementById('q-counter').textContent=(cur+1)+' / '+qs.length;
  document.getElementById('q-bar').style.width=((cur+1)/qs.length*100)+'%';
}
function answer(yes){
  score+=yes?(qs[cur].rev?0:1):(qs[cur].rev?1:0);
  cur++;
  if(cur<qs.length){render();}else{showResult();}
}
function showResult(){
  document.getElementById('quiz-section').classList.add('hide');
  var rd=document.getElementById('result');
  rd.classList.add('show');
  var t=types.find(function(x){return score>=(x===types[0]?8:x===types[1]?5:x===types[2]?3:0)&&score<=(x===types[0]?10:x===types[1]?7:x===types[2]?4:2)})||types[3];
  document.getElementById('r-score').textContent=score;
  document.getElementById('r-type').textContent=t.name;
  document.getElementById('r-desc').textContent=t.desc;
  document.getElementById('r-tip').textContent=t.tip;
  ['row0','row1','row2','row3'].forEach(function(id){
    var row=document.getElementById(id);
    row.classList.remove('highlight');
    row.querySelector('.type-name').classList.remove('active');
  });
  var hr=document.getElementById(t.rid);
  hr.classList.add('highlight');
  hr.querySelector('.type-name').classList.add('active');
}
function restart(){
  cur=0;score=0;
  document.getElementById('result').classList.remove('show');
  document.getElementById('quiz-section').classList.remove('hide');
  render();
}
render();
</script>
</body>
</html>
