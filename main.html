<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서하쌤의 진로취업 도구 모음</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.1);
      --text: #1a1a18;
      --muted: #6b6b67;
      --purple: #534AB7;
      --purple-light: #EEEDFE;
      --teal: #0F6E56;
      --teal-light: #E1F5EE;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 2rem 2rem 1.5rem;
      max-width: 960px;
      margin: 0 auto;
    }

    .badge-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }

    .badge {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px; background: var(--purple-light);
      color: var(--purple); font-weight: 500;
    }

    header h1 { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    header p  { font-size: 14px; color: var(--muted); }

    .stats {
      max-width: 960px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; padding: 1.2rem 2rem;
    }

    .stat {
      background: #f0eeea; border-radius: 8px;
      padding: 0.8rem 1rem; text-align: center;
    }

    .stat .num { font-size: 20px; font-weight: 600; }
    .stat .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

    main {
      max-width: 960px; margin: 0 auto;
      padding: 0 2rem 3rem;
    }

    .section-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      letter-spacing: 0.07em; text-transform: uppercase;
      margin: 1.5rem 0 0.8rem;
    }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }

    .widget-card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .widget-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .card-header { display: flex; align-items: center; gap: 10px; }

    .card-icon {
      width: 36px; height: 36px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .icon-purple { background: var(--purple-light); }
    .icon-teal   { background: var(--teal-light); }

    .card-title  { font-size: 14px; font-weight: 600; }
    .card-desc   { font-size: 12px; color: var(--muted); }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      header, main { padding-left: 1rem; padding-right: 1rem; }
    }
  </style>
</head>

<body>

<header>
  <div class="badge-row">
    <span class="badge">대학 진로수업</span>
    <span class="badge">취업센터</span>
  </div>
  <h1>서하쌤의 진로취업 도구 모음</h1>
  <p>수강생이 직접 활용하는 시간관리 실습 위젯</p>
</header>

<!-- 통계 -->
<div class="stats">
  <div class="stat"><div class="num">2</div><div class="lbl">위젯</div></div>
  <div class="stat"><div class="num">실습형</div><div class="lbl">참여형 활동</div></div>
  <div class="stat"><div class="num">무료</div><div class="lbl">수강생 개방</div></div>
</div>

<main>
  <div class="section-label">시간관리 핵심 위젯</div>

  <div class="grid">

    <!-- ① 시간관리진단 -->
    <a href="https://seohajobv.github.io/class/widgets/quiz_only.html" target="_blank" class="widget-card">
      <div class="card-header">
        <div class="card-icon icon-purple">⏱️</div>
        <div>
          <div class="card-title">시간관리진단</div>
        </div>
      </div>
      <div class="card-desc">
        현재 나의 시간 사용 습관을 체크하고, 개선 포인트를 진단하는 자기 점검형 위젯
      </div>
    </a>

    <!-- ② 시간 영수증 -->
    <a href="https://seohajobv.github.io/class/widgets/receipt_widget.html" target="_blank" class="widget-card">
      <div class="card-header">
        <div class="card-icon icon-teal">🧾</div>
        <div>
          <div class="card-title">시간 영수증</div>
        </div>
      </div>
      <div class="card-desc">
        하루 24시간을 소비 내역처럼 기록하여 시간의 흐름을 시각적으로 확인하는 실습 도구
      </div>
    </a>

  </div>
</main>

</body>
</html>
